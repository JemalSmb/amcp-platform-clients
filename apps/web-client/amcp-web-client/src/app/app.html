<div class="drawer">
  <input id="user-drawer" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content">
    <div class="navbar bg-base-100">
      <div class="flex-1">
        <div class="ml-4 text-xl font-bold">AMCP</div>
      </div>
      <div class="flex-none px-2">
        <label for="user-drawer" class="btn btn-ghost drawer-button">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </label>
      </div>
    </div>
    <main class="p-4">
      <h1 class="text-2xl font-bold">{{ title }}</h1>
      <p>Content goes here</p>
    </main>
  </div>
  <div class="drawer-side">
    <label for="user-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <div class="absolute top-4 left-80 -ml-12">
      <label for="user-drawer" class="btn btn-ghost btn-circle">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </label>
    </div>
    <ul class="menu bg-base-200 min-h-full w-20 p-4 text-base-content">
      @for (item of menuItems; track item) {
        <li><a title="{{ item }}" class="p-2">
          <img class="w-6 h-6" [src]="getMenuIcon(item)" [alt]="item" />
        </a></li>
      }
    </ul>
  </div>
</div>
